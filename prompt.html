<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sidecar</title>
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="themes/speakeasy.css" />
  <link rel="stylesheet" href="themes/film-noir.css" />
  <link rel="stylesheet" href="themes/art-deco.css" />
  <link rel="stylesheet" href="themes/patterns.css" />
  <style>
    :root {
      /* Theme-specific color variables are loaded from themes/*.css */
      color-scheme: dark; /* dark-only UI — keep native controls dark in Light Mode */
      --font-display: 'Playfair Display', Georgia, serif;
      --font-ui: 'Manrope', system-ui, -apple-system, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;

      /* Default fallback colors (will be overridden by theme files) */
      --bg: #0a0118;
      --velvet-1: #23114a;
      --velvet-2: #160a30;
      --border: rgba(167, 139, 250, 0.16);
      --border-strong: rgba(167, 139, 250, 0.28);
      --orange: #ea772f;
      --gold: #cba14e;
      --gold-soft: rgba(203, 161, 78, 0.5);
      --purple: #a78bfa;
      --lav: #bda1ff;
      --text: #f1e8f8;
      --muted: #9a86c4;
      --faint: #6f5fa0;
      --red: #f0566b;
      --sheen: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      --pattern-opacity: 1;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      font-family: var(--font-ui);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      background-color: var(--bg);
      background-repeat: repeat, no-repeat, no-repeat, no-repeat;
      background-attachment: fixed;
    }
    body { text-align: center; }
    /* Scrollable content + a footer that keeps Allow/Reject in view no matter how
       tall the body grows (heads-up card, preview, switch menu, unlock field). */
    /* The scrollable content fades out at its bottom edge, so text visibly
       dissolves above the buttons — an unmistakable "there's more to scroll". */
    .prompt-scroll {
      flex: 1 1 auto; overflow-y: auto; padding: 22px 22px 6px;
      -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 30px), transparent);
      mask-image: linear-gradient(to bottom, #000 calc(100% - 30px), transparent);
    }
    .prompt-footer {
      flex-shrink: 0;
      padding: 10px 22px 18px;
      background: rgba(12, 3, 26, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .brand { display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
    .brand img { height: 26px; width: auto; display: block; filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4)); }
    .host {
      font-family: var(--font-display); font-weight: 700;
      font-size: 19px; color: var(--lav);
      word-break: break-all; margin-bottom: 3px;
    }
    .ask { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
    .shared-note {
      margin: 2px 0 14px; padding: 9px 11px; border-radius: 9px;
      background: rgba(203, 161, 78, 0.1); border: 1px solid var(--gold-soft);
      color: var(--text); font-size: 12px; line-height: 1.45; text-align: left;
    }
    .shared-headsup {
      margin: 2px 0 14px; padding: 11px 12px; border-radius: 10px;
      background: rgba(203, 161, 78, 0.1); border: 1px solid var(--gold-soft); text-align: left;
    }
    .shared-headsup-title { color: var(--gold); font-weight: 700; font-size: 13px; margin-bottom: 6px; }
    .shared-headsup-body { margin: 0 0 10px; color: var(--text); font-size: 12px; line-height: 1.45; }
    .shared-headsup-btn {
      display: block; width: 100%; padding: 8px; border-radius: 8px; cursor: pointer;
      background: rgba(203, 161, 78, 0.16); border: 1px solid var(--gold-soft);
      color: var(--gold); font-weight: 600; font-size: 12.5px;
    }
    .shared-headsup-btn:hover { filter: brightness(1.12); }
    .shared-caption {
      margin: 2px 0 8px; text-align: center;
      color: var(--muted); font-size: 11.5px; letter-spacing: 0.02em;
    }
    .card {
      position: relative; text-align: left;
      background: linear-gradient(160deg, var(--velvet-1), var(--velvet-2));
      border: 1px solid var(--border); border-radius: 12px;
      padding: 13px; margin-bottom: 16px; font-size: 13px;
      box-shadow: var(--sheen);
    }
    .card .row { display: flex; justify-content: space-between; gap: 8px; padding: 3px 0; }
    .card .row span:first-child { color: var(--muted); }
    .card .row span:last-child { word-break: break-all; text-align: right; font-family: var(--font-mono); font-size: 12px; }
    pre {
      background: rgba(8, 2, 20, 0.6); border-radius: 8px; padding: 10px; margin: 8px 0 0;
      font-family: var(--font-mono);
      font-size: 12px; white-space: pre-wrap; word-break: break-word;
      max-height: 160px; overflow: auto; color: var(--text);
    }
    /* Event-content preview: short by default (keeps the account card in view),
       expandable, with a Formatted/Raw toggle for note-like kinds. */
    .evpreview {
      background: rgba(8, 2, 20, 0.6); border-radius: 8px; padding: 10px; margin: 8px 0 0;
      font-size: 12.5px; line-height: 1.5; color: var(--text); text-align: left;
      white-space: pre-wrap; overflow-wrap: anywhere;
    }
    .evpreview.mono { font-family: var(--font-mono); font-size: 12px; }
    .evpreview.clamped {
      max-height: 120px; overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 24px), transparent);
      mask-image: linear-gradient(to bottom, #000 calc(100% - 24px), transparent);
    }
    .evpreview:not(.clamped) { max-height: 320px; overflow-y: auto; }
    .evpreview .ev-media { display: block; max-width: 100%; max-height: 220px; border-radius: 7px; margin: 6px 0; }
    .evpreview .ev-mention { color: var(--lav); }
    .evpreview .ev-ref { color: var(--muted); }
    .evpreview a { color: var(--lav); word-break: break-all; }
    .evpreview-controls { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 7px; }
    .evpreview-modes { display: flex; gap: 12px; }
    .evpreview-mode {
      background: none; border: none; padding: 2px 0; cursor: pointer;
      color: var(--muted); font-size: 11.5px; font-family: inherit;
    }
    .evpreview-mode:hover { color: var(--text); }
    .evpreview-mode.active { color: var(--lav); font-weight: 600; }
    .evpreview-toggle {
      background: none; border: none; padding: 2px 0; cursor: pointer;
      color: var(--lav); font-size: 11.5px; font-family: inherit;
    }
    .evpreview-toggle:hover { color: var(--text); }
    .kind-warn {
      margin-top: 8px; padding: 8px 10px; border-radius: 8px;
      background: rgba(255, 179, 138, 0.1); border: 1px solid rgba(255, 179, 138, 0.3);
      color: #ffb38a; font-size: 12px; text-align: left;
    }
    .info-note {
      margin-bottom: 16px; padding: 9px 11px; border-radius: 8px;
      background: rgba(167, 139, 250, 0.08); border: 1px solid rgba(167, 139, 250, 0.22);
      color: var(--muted); font-size: 11.5px; line-height: 1.45; text-align: left;
    }
    .account { margin-bottom: 18px; }
    .switch-toggle {
      display: block; width: 100%; background: none; border: none; cursor: pointer;
      color: var(--lav); font-size: 12.5px; text-align: center; margin: -10px 0 14px; padding: 4px;
    }
    .switch-toggle:hover { color: var(--text); }
    .switch-menu {
      text-align: left;
      background: linear-gradient(180deg, var(--velvet-1), var(--velvet-2));
      border: 1px solid var(--border-strong); border-radius: 14px;
      padding: 6px; margin: -6px 0 14px; box-shadow: var(--sheen);
    }
    .switch-row {
      display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
      background: transparent; border: none; cursor: pointer; color: var(--text);
      padding: 9px 10px; border-radius: 10px; font-family: inherit; font-weight: 400;
    }
    .switch-row:hover { background: rgba(167, 139, 250, 0.1); }
    .switch-row.active { background: rgba(203, 161, 78, 0.08); }
    .switch-row-av { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #2a1257; }
    .switch-row-info { flex: 1; min-width: 0; }
    .switch-row-name { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .switch-row-npub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .switch-row-check { width: 16px; height: 16px; color: var(--gold); flex-shrink: 0; }
    .as-label { font-size: 10.5px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.22em; }
    .acct-capsule {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: linear-gradient(150deg, var(--velvet-1), var(--velvet-2));
      border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; box-shadow: var(--sheen);
    }
    .acct-av { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #2a1257; box-shadow: 0 0 0 1px var(--gold-soft); }
    .acct-meta { min-width: 0; text-align: center; }
    .acct-name { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .acct-np { font-family: var(--font-mono); font-size: 11.5px; color: var(--faint); margin-top: 4px; word-break: break-all; }
    label { display: block; font-size: 12px; letter-spacing: 0.03em; color: var(--muted); margin: 0 0 6px; }
    input[type=password] {
      width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(8, 2, 20, 0.6), rgba(20, 4, 40, 0.6));
      color: var(--text); font-size: 16px; margin-bottom: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type=password]:focus { outline: none; border-color: var(--gold-soft); box-shadow: 0 0 0 3px rgba(203, 161, 78, 0.16); }
    .remember { margin-bottom: 14px; }
    .remember .check { display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text); font-size: 13px; text-transform: none; letter-spacing: 0; margin-bottom: 8px; cursor: pointer; }
    .remember input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--orange); cursor: pointer; }
    .budget-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .remember input[type=number] {
      width: 110px; padding: 9px 11px; border-radius: 10px; border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(8, 2, 20, 0.6), rgba(20, 4, 40, 0.6));
      color: var(--text); font-size: 14px; font-family: var(--font-mono);
    }
    .remember input[type=number]:focus { outline: none; border-color: var(--gold-soft); }
    .remember input[type=number]:disabled { opacity: 0.4; cursor: not-allowed; }
    .budget-unit { font-size: 12.5px; color: var(--muted); }
    .error { color: var(--red); font-size: 13px; min-height: 18px; margin-bottom: 8px; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    button {
      width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
      transition: transform 0.12s, filter 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .primary {
      background: linear-gradient(180deg, #f29248, var(--orange) 55%, #d4621f); color: #1c0c00;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 8px 22px rgba(234, 119, 47, 0.28);
    }
    .primary:hover { filter: brightness(1.06); transform: translateY(-1px); }
    .lav-btn {
      background: linear-gradient(180deg, #cebfff, var(--lav) 58%, var(--purple)); color: #190a33;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 8px 22px rgba(167, 139, 250, 0.24);
    }
    .lav-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .secondary {
      background: linear-gradient(180deg, var(--velvet-1), var(--velvet-2));
      color: var(--text); border: 1px solid var(--border); box-shadow: var(--sheen);
    }
    .secondary:hover { border-color: var(--gold-soft); }
    .ghost { background: transparent; color: var(--muted); }
    .ghost:hover { color: var(--text); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="prompt-scroll">
    <div class="brand"><img src="icons/sidecar-logo.svg" alt="Sidecar" /></div>
    <div class="host" id="host">…</div>
    <div class="ask" id="ask">wants to…</div>

    <div id="preview" class="card hidden"></div>

    <div id="decrypt-note" class="info-note hidden"></div>

    <div class="account" id="account"></div>
    <button class="switch-toggle hidden" id="switch-toggle">Sign in with a different account</button>
    <div class="switch-menu hidden" id="switch-menu"></div>

    <div id="unlock" class="hidden">
      <label for="pin">Enter your PIN to unlock</label>
      <input type="password" id="pin" autocomplete="off" maxlength="32" autofocus />
    </div>

    <div id="remember" class="remember hidden">
      <label class="check"><input type="checkbox" id="remember-budget" /> Allow this site to spend up to</label>
      <div class="budget-row">
        <input type="number" id="budget-amount" min="1" placeholder="sats" />
        <span class="budget-unit">sats / day without asking</span>
      </div>
    </div>
  </div>

  <div class="prompt-footer">
    <div class="error" id="error"></div>
    <div class="actions">
      <button class="primary" id="allow">Allow once</button>
      <button class="lav-btn" id="trust">Trust this site</button>
      <button class="ghost" id="reject">Reject</button>
    </div>
  </div>

  <script src="prompt.js"></script>
</body>
</html>
